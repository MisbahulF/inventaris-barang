<!DOCTYPE html>
<!--
 * Deskripsi   : Halaman formulir edit/update data barang. Mengambil ID dari query string URL,
 *               memuat data barang yang ada, lalu mengirim perubahan ke API via PUT.
 * Initial State: Halaman baru dimuat dengan query ?id=<mongoId>; form masih kosong.
 * Final State  : Data barang terbaru tersimpan di database, pengguna diarahkan kembali.
 * Author       : Misbahul Fadhillah
 * Versi/Tanggal: 1.0.0 / 12 Juli 2026
-->
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Edit Data Barang — Sistem Manajemen Inventaris" />
  <title>Edit Barang | Inventaris BNSP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#4f46e5', dark: '#3730a3' },
            accent:  { DEFAULT: '#06b6d4' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-800">

  <!-- HEADER -->
  <header class="bg-gradient-to-r from-primary to-accent shadow-lg">
    <div class="max-w-3xl mx-auto px-4 py-5 flex items-center gap-3">
      <a href="/" class="text-white hover:text-indigo-200 transition text-xl" title="Kembali">←</a>
      <div>
        <h1 class="text-white text-xl font-bold">✏️ Edit Data Barang</h1>
        <p class="text-indigo-100 text-sm">Perbarui informasi barang di bawah ini</p>
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow p-8">

      <!-- Alert Box -->
      <div id="alert-box" class="hidden mb-5 p-3 rounded-lg text-sm font-medium"></div>

      <!-- Loading Skeleton -->
      <div id="loading" class="space-y-4">
        <div class="h-4 bg-slate-200 rounded animate-pulse w-1/3"></div>
        <div class="h-10 bg-slate-100 rounded animate-pulse"></div>
        <div class="h-4 bg-slate-200 rounded animate-pulse w-1/3"></div>
        <div class="h-10 bg-slate-100 rounded animate-pulse"></div>
        <div class="h-4 bg-slate-200 rounded animate-pulse w-1/3"></div>
        <div class="h-10 bg-slate-100 rounded animate-pulse"></div>
      </div>

      <!-- Formulir Edit — tersembunyi sampai data dimuat -->
      <form id="form-edit" class="hidden space-y-5" novalidate>

        <!-- Kode Barang (readonly — tidak bisa diubah) -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Kode Barang</label>
          <input id="kodeBarang" type="text"
            class="w-full border border-slate-200 bg-slate-50 rounded-lg px-3 py-2 text-sm text-slate-400 cursor-not-allowed"
            readonly />
          <p class="text-xs text-slate-400 mt-1">Kode barang tidak dapat diubah.</p>
        </div>

        <!-- Nama Barang -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1" for="namaBarang">
            Nama Barang <span class="text-red-500">*</span>
          </label>
          <input id="namaBarang" type="text" required
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
        </div>

        <!-- Kategori -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1" for="kategori">
            Kategori <span class="text-red-500">*</span>
          </label>
          <input id="kategori" type="text" required
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
        </div>

        <!-- Stok & Harga -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1" for="stok">Stok</label>
            <input id="stok" type="number" min="0"
              class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1" for="harga">Harga (Rp)</label>
            <input id="harga" type="number" min="0"
              class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary" />
          </div>
        </div>

        <!-- Keterangan -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1" for="keterangan">Keterangan</label>
          <textarea id="keterangan" rows="3"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary resize-none"
            placeholder="Catatan tambahan (opsional)"></textarea>
        </div>

        <!-- Tombol Aksi -->
        <div class="flex justify-between gap-3 pt-2">
          <a href="/"
            class="px-5 py-2 text-sm border border-slate-300 rounded-lg text-slate-600 hover:bg-slate-50 transition text-center">
            ← Batal
          </a>
          <button type="submit" id="btn-update"
            class="px-6 py-2 bg-primary text-white text-sm font-semibold rounded-lg hover:bg-primary-dark transition flex items-center gap-2">
            <span id="btn-icon">💾</span>
            <span id="btn-label">Simpan Perubahan</span>
          </button>
        </div>
      </form>

      <!-- Error State -->
      <div id="error-state" class="hidden text-center py-8">
        <p class="text-4xl mb-3">❌</p>
        <p id="error-msg" class="text-sm text-red-500">Barang tidak ditemukan.</p>
        <a href="/" class="mt-4 inline-block text-sm text-primary underline">← Kembali ke halaman utama</a>
      </div>

    </div>
  </main>

  <footer class="text-center text-xs text-slate-400 py-6">
    Sistem Manajemen Inventaris Barang &copy; 2026 · Misbahul Fadhillah
  </footer>

  <script>
    /**
     * Deskripsi   : Script halaman edit. Mengambil ID dari URL, memuat data barang
     *               dari API, mengisi form, lalu mengirim data yang diperbarui via PUT.
     * Initial State: URL mengandung ?id=<mongoId>, form masih kosong.
     * Final State  : Data berhasil diperbarui di database, redirect ke halaman utama.
     * Author       : Misbahul Fadhillah
     * Versi/Tanggal: 1.0.0 / 12 Juli 2026
     */

    const API_URL = '/api/barang';

    /**
     * Prosedur menampilkan alert di form edit.
     * @param {String} pesan
     * @param {String} tipe - 'success' | 'error' | 'warning'
     */
    function tampilkanAlert(pesan, tipe) {
      const box = document.getElementById('alert-box');
      const kelas = {
        success: 'bg-green-100 text-green-800 border border-green-300',
        error:   'bg-red-100 text-red-800 border border-red-300',
        warning: 'bg-yellow-100 text-yellow-800 border border-yellow-300',
      };
      box.className = `mb-5 p-3 rounded-lg text-sm font-medium ${kelas[tipe] || kelas.warning}`;
      box.textContent = pesan;
      box.classList.remove('hidden');
    }

    /**
     * Deskripsi   : Fungsi async untuk memuat data barang dari API berdasarkan ID.
     *               ID diambil dari query string URL (?id=...).
     * Initial State: Form tersembunyi, skeleton loading tampil.
     * Final State  : Form terisi data barang, skeleton loading disembunyikan.
     */
    async function muatDataBarang() {
      // Ambil ID dari parameter URL
      const params = new URLSearchParams(window.location.search);
      const id     = params.get('id');

      const loading    = document.getElementById('loading');
      const formEdit   = document.getElementById('form-edit');
      const errorState = document.getElementById('error-state');

      // Validasi: jika tidak ada ID di URL, tampilkan error
      if (!id) {
        loading.classList.add('hidden');
        errorState.classList.remove('hidden');
        document.getElementById('error-msg').textContent = 'ID barang tidak ditemukan di URL.';
        return;
      }

      try {
        // Fetch data barang berdasarkan ID
        const response = await fetch(`${API_URL}/${id}`);
        const result   = await response.json();

        // Sembunyikan loading skeleton
        loading.classList.add('hidden');

        // Percabangan: tampilkan error jika barang tidak ditemukan
        if (!result.success) {
          errorState.classList.remove('hidden');
          document.getElementById('error-msg').textContent = result.message;
          return;
        }

        // Isi setiap field form dengan data yang diterima dari API
        const b = result.data;
        document.getElementById('kodeBarang').value  = b.kodeBarang;
        document.getElementById('namaBarang').value  = b.namaBarang;
        document.getElementById('kategori').value    = b.kategori;
        document.getElementById('stok').value        = b.stok;
        document.getElementById('harga').value       = b.harga;
        document.getElementById('keterangan').value  = b.keterangan || '';

        // Tampilkan form yang sudah terisi
        formEdit.classList.remove('hidden');

        // Simpan ID di atribut data form untuk digunakan saat submit
        formEdit.dataset.barangId = id;

      } catch (err) {
        loading.classList.add('hidden');
        errorState.classList.remove('hidden');
        document.getElementById('error-msg').textContent =
          'Tidak dapat terhubung ke server. Pastikan backend berjalan di port 5000.';
        console.error('[Client] Error muatDataBarang:', err);
      }
    }

    /**
     * Deskripsi   : Event handler submit form edit. Mengambil nilai field,
     *               memvalidasi, lalu mengirim PUT request ke API.
     * Initial State: Form berisi data lama.
     * Final State  : Data baru terkirim ke API, pengguna diarahkan ke halaman utama.
     */
    document.getElementById('form-edit').addEventListener('submit', async function (e) {
      e.preventDefault();

      const id         = this.dataset.barangId;
      const namaBarang = document.getElementById('namaBarang').value.trim();
      const kategori   = document.getElementById('kategori').value.trim();
      const stok       = parseInt(document.getElementById('stok').value)  || 0;
      const harga      = parseInt(document.getElementById('harga').value) || 0;
      const keterangan = document.getElementById('keterangan').value.trim();

      // Validasi sisi client
      if (!namaBarang || !kategori) {
        tampilkanAlert('Nama Barang dan Kategori wajib diisi!', 'warning');
        return;
      }

      // Aktifkan loading state pada tombol
      document.getElementById('btn-label').textContent = 'Menyimpan...';
      document.getElementById('btn-icon').textContent  = '⏳';
      document.getElementById('btn-update').disabled   = true;

      try {
        // Kirim PUT request ke endpoint API
        const response = await fetch(`${API_URL}/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ namaBarang, kategori, stok, harga, keterangan }),
        });
        const result = await response.json();

        if (result.success) {
          tampilkanAlert(`Barang "${result.data.namaBarang}" berhasil diperbarui! Mengalihkan...`, 'success');
          // Redirect ke halaman utama setelah 1.5 detik
          setTimeout(() => { window.location.href = '/'; }, 1500);
        } else {
          tampilkanAlert(result.message || 'Gagal memperbarui data.', 'error');
          document.getElementById('btn-label').textContent = 'Simpan Perubahan';
          document.getElementById('btn-icon').textContent  = '💾';
          document.getElementById('btn-update').disabled   = false;
        }
      } catch (err) {
        tampilkanAlert('Error jaringan. Pastikan server berjalan di port 5000.', 'error');
        document.getElementById('btn-label').textContent = 'Simpan Perubahan';
        document.getElementById('btn-icon').textContent  = '💾';
        document.getElementById('btn-update').disabled   = false;
        console.error('[Client] Error updateBarang:', err);
      }
    });

    // Muat data barang saat DOM siap
    document.addEventListener('DOMContentLoaded', muatDataBarang);
  </script>
</body>
</html>
